name: Push Landing Release to AWS
run-name: "Production: Release ${{ github.event.release.tag_name }} landing image to AWS"

permissions:
  contents: read

concurrency: release

on:
  release:
    types: [published]

jobs:
  release:
    if: github.event.release.prerelease == false
    name: Build and Push/Tag Landing Image
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release code at tag commit
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Parse landing version from release tag
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail

          # Keep the existing release-tag contract and use its web component
          # as the version of the landing image.
          if [[ $RELEASE_TAG =~ ^([0-9]+)-srv([0-9]+)-web([0-9]+)$ ]]; then
            LANDING_VERSION="v${BASH_REMATCH[3]}"
          elif [[ $RELEASE_TAG =~ ^v([0-9]+)\+srv([0-9]+)\.web([0-9]+)$ ]]; then
            LANDING_VERSION="v${BASH_REMATCH[3]}"
          else
            echo "Error: Invalid tag format. Expected NNNN-srvNNN-webNNN or vNNNN+srvNNN.webNNN"
            exit 1
          fi

          echo "LANDING_VERSION=${LANDING_VERSION}" >> "$GITHUB_ENV"
          echo "Landing image version: ${LANDING_VERSION}"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b
        with:
          aws-access-key-id: ${{ secrets.PINGPONG_AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.PINGPONG_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64

      - name: Check if landing image exists
        shell: bash
        env:
          ENVIRONMENT: prod
          PINGPONG_LANDING_REPO: ${{ vars.PINGPONG_LANDING_REPO }}
        run: |
          set -euo pipefail

          REGISTRY_ID="${{ vars.PINGPONG_REGISTRY_ENDPOINT }}"
          REGISTRY_ID=${REGISTRY_ID%%.*}
          echo "REGISTRY_ID=${REGISTRY_ID}" >> "$GITHUB_ENV"

          if aws ecr describe-images \
            --repository-name "$PINGPONG_LANDING_REPO" \
            --registry-id "$REGISTRY_ID" \
            --image-ids "imageTag=${LANDING_VERSION}" >/dev/null 2>&1; then
            IMAGE_TAGS=$(aws ecr describe-images \
              --repository-name "$PINGPONG_LANDING_REPO" \
              --registry-id "$REGISTRY_ID" \
              --image-ids "imageTag=${LANDING_VERSION}" \
              --query 'imageDetails[0].imageTags' \
              --output text)

            if tr '\t' '\n' <<< "$IMAGE_TAGS" | grep -qx "$ENVIRONMENT"; then
              echo "LANDING_IMAGE_STATUS=EXISTS_WITH_ENV_TAG" >> "$GITHUB_ENV"
              echo "Landing image ${LANDING_VERSION} already has the ${ENVIRONMENT} tag."
            else
              echo "LANDING_IMAGE_STATUS=EXISTS_WITHOUT_ENV_TAG" >> "$GITHUB_ENV"
              echo "Landing image ${LANDING_VERSION} exists without the ${ENVIRONMENT} tag."
            fi
          else
            echo "LANDING_IMAGE_STATUS=DOES_NOT_EXIST" >> "$GITHUB_ENV"
            echo "Landing image ${LANDING_VERSION} does not exist."
          fi

      - name: Tag existing landing image for release
        if: ${{ env.LANDING_IMAGE_STATUS == 'EXISTS_WITHOUT_ENV_TAG' }}
        shell: bash
        env:
          ENVIRONMENT: prod
          PINGPONG_LANDING_REPO: ${{ vars.PINGPONG_LANDING_REPO }}
        run: |
          set -euo pipefail

          MANIFEST=$(aws ecr batch-get-image \
            --repository-name "$PINGPONG_LANDING_REPO" \
            --registry-id "$REGISTRY_ID" \
            --image-ids "imageTag=${LANDING_VERSION}" \
            --output text \
            --query 'images[].imageManifest')

          aws ecr put-image \
            --repository-name "$PINGPONG_LANDING_REPO" \
            --registry-id "$REGISTRY_ID" \
            --image-tag "$ENVIRONMENT" \
            --image-manifest "$MANIFEST"

          echo "Tagged landing image ${LANDING_VERSION} with ${ENVIRONMENT}."

      - name: Build landing image for release
        if: ${{ env.LANDING_IMAGE_STATUS == 'DOES_NOT_EXIST' }}
        shell: bash
        env:
          PINGPONG_LANDING_REGISTRY: ${{ vars.PINGPONG_LANDING_REGISTRY }}
        run: |
          set -euo pipefail

          echo "Building landing image ${LANDING_VERSION}."
          docker build \
            --platform linux/amd64 \
            --file web/Dockerfile \
            --tag "${PINGPONG_LANDING_REGISTRY}:${LANDING_VERSION}" \
            web

      - name: Push landing image for release
        if: ${{ env.LANDING_IMAGE_STATUS == 'DOES_NOT_EXIST' }}
        shell: bash
        env:
          ENVIRONMENT: prod
          PINGPONG_LANDING_REGISTRY: ${{ vars.PINGPONG_LANDING_REGISTRY }}
        run: |
          set -euo pipefail

          aws ecr get-login-password --region "${{ vars.AWS_REGION }}" | \
            docker login --username AWS --password-stdin "${{ vars.PINGPONG_REGISTRY_ENDPOINT }}"

          docker tag \
            "${PINGPONG_LANDING_REGISTRY}:${LANDING_VERSION}" \
            "${PINGPONG_LANDING_REGISTRY}:${ENVIRONMENT}"

          docker push "${PINGPONG_LANDING_REGISTRY}:${LANDING_VERSION}"
          docker push "${PINGPONG_LANDING_REGISTRY}:${ENVIRONMENT}"

          echo "Built and pushed landing image ${LANDING_VERSION} with ${ENVIRONMENT}."
